version: '3.8'

services:
  account-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: account-service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - account-service-network

networks:
  account-service-network:
    driver: bridge
