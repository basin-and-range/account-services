<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webex Call Control API Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        .image-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 4px;
        }

        h1 {
            text-align: center;
            color: #1b1b1b;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .header {
            background-color: #1b1b1b;
            color: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: white;
            margin: 0;
        }

        .footer {
            background-color: #1b1b1b;
            color: #999;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .footer a {
            color: #89bf04;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            
            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Webex Call Control API Documentation</h1>
    </div>

    <div class="container">
        <div class="image-container">
            <img src="../public/webex-api.png" alt="Webex Call Control API Documentation" />
        </div>
    </div>

    <div class="footer">
        <p>Webex Call Control API | <a href="https://developer.webex.com/calling/docs/api/v1/call-controls/" target="_blank">Official Documentation</a></p>
    </div>
</body>
</html>
