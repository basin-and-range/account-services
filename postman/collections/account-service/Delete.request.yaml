$kind: http-request
url: "{{baseUrl}}/accounts?accountNumber={{accountNumber}}"
method: DELETE
queryParams:
  accountNumber: "{{accountNumber}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
    language: text/javascript
examples: ./.resources/Delete.resources/examples
order: 4000
